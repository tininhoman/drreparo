.icon-bar {
    display: flex;
    justify-content: center;
    flex-wrap: wrap; /* ESSENCIAL: faz os ícones descerem para a próxima linha se não couberem */
    gap: 30px;
    padding: 40px 20px;
}

        .icon-item {
            text-decoration: none;
            color: #002266;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Animação de flutuação */
            animation: float 3s ease-in-out infinite;
        }

        /* Efeito de movimento diferente para cada ícone */
        .icon-item:nth-child(2) { animation-delay: 0.5s; }
        .icon-item:nth-child(3) { animation-delay: 1s; }
        .icon-item:nth-child(4) { animation-delay: 1.5s; }
        .icon-item:nth-child(5) { animation-delay: 2s; }

        .icon-item:hover {
            color: #ff9900;
            transform: scale(1.2) !important;
            animation-play-state: paused;
        }

        .icon-item i {
            font-size: 2.5rem;
            margin-bottom: 5px;
            font-style: normal;
            /* Sombra leve para destacar da bancada */
            filter: drop-shadow(2px 2px 2px rgba(255,255,255,0.8));
        }

        .icon-item span {
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.6);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Definição da animação de flutuar */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
/* Área dos Ícones Adaptável */
