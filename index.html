<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Reparo - Especialista em Manutenção</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Fundo */
        .bg-plano {
            position: fixed;
            top: 0;
            left: 0;
            width: 120%;
            height: 100%;
            background: url('plano.png') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        .container {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 6%;
        }

        /* Cabeçalho */
        .header-site img {
            max-width: 250px;
            height: auto;
            margin-top: -5px;
        }

        /* Hero */
        .hero-content {
            max-width: 550px;
            margin-top: 100px;
            position: relative;
            z-index: 5;
        }

        .hero-content h1 {
            font-size: 2.8rem;
            font-weight: 900;
            color: #002266;
            margin-bottom: 20px;
            text-shadow: none;
        }

        .btn-whatsapp {
            display: inline-block;
            background: #25d366;
            color: white;
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .btn-whatsapp:hover {
            transform: scale(1.05);
        }

        /* Ícones */
        .icon-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            padding: 20px 5%;
            margin-bottom: 80px;
        }

        .icon-item {
            text-decoration: none;
            color: #002266;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.2s;
        }

        .icon-item:hover {
            color: #ff9900;
            transform: scale(1.05);
        }

        .icon-item i {
            font-size: 2.3rem;
            margin-bottom: 5px;
            filter: drop-shadow(1px 1px 2px rgba(255,255,255,0.8));
        }

        .icon-item span {
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.7);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Footer */
        .footer-barra {
            background-color: #000;
            color: #fff;
            padding: 16px 6%;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            z-index: 100;
        }

        .footer-barra a {
            color: #ff9900;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #ff9900;
            padding: 4px 10px;
            border-radius: 4px;
            transition: 0.3s;
        }

        .footer-barra a:hover {
            background: #ff9900;
            color: #000;
        }

        @media (max-width: 600px) {
            .hero-content {
                margin-top: 50px;
            }
            .hero-content h1 {
                font-size: 2rem;
            }
            .icon-bar {
                margin-bottom: 100px;
            }
            .icon-item i {
                font-size: 1.8rem;
            }
            .icon-item span {
                font-size: 0.75rem;
            }
        }
    </style>
</head>

<body>

    <div class="bg-plano"></div>

    <div class="container">

        <header class="header-site">
            <img src="logo.png" alt="Dr. Reparo">
        </header>

        <div class="hero-content">
            <h1>Especialista em Manutenção Predial</h1>
            <a href="https://wa.me/351910878830" class="btn-whatsapp">WhatsApp Orçamento</a>
        </div>

        <div class="icon-bar">
            <a href="servicos-eletrica.html" class="icon-item">
                <i>⚡</i><span>Eletricidade</span>
            </a>
            <a href="servicos-pichelaria.html" class="icon-item">
                <i>🔧</i><span>Pichelaria</span>
            </a>
            <a href="servicos-seguranca.html" class="icon-item">
                <i>🛡️</i><span>Segurança</span>
            </a>
            <a href="servicos-multi.html" class="icon-item">
                <i>🛠️</i><span>Reparações</span>
            </a>
            <a href="servicos-moveis.html" class="icon-item">
                <i>📦</i><span>Montagens</span>
            </a>
        </div>

    </div>

    <footer class="footer-barra">
        <div>📍 Gondomar, Porto | 📞 910 878 830</div>
        <a href="contacto.html">Página de Contacto</a>
    </footer>

</body>
</html>
