<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Dr. Reparo</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">

    <style>
        /* Mantive apenas o estilo específico da página */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding-top: 160px; /* espaço para o menu premium */
        }

        .card-contacto {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: left;
            width: 100%;
            max-width: 450px;
        }

        h1 { 
            color: #002266; 
            margin-bottom: 30px; 
            font-size: 2rem;
            border-bottom: 3px solid #ff9900;
            display: inline-block;
        }

        .info-item { 
            margin-bottom: 20px; 
            font-size: 1.15rem; 
            color: #333;
            display: flex;
            align-items: center;
        }

        .info-item strong { color: #002266; margin-right: 10px; }
        
        .icon { font-style: normal; margin-right: 15px; font-size: 1.4rem; }

        .btn-voltar {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            color: #fff;
            background-color: #002266;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
            width: 100%;
            text-align: center;
        }

        .btn-voltar:hover { background-color: #ff9900; }
    </style>
</head>
<body class="pagina-interna">

    <script>
        function toggleMenu() {
            document.getElementById('menu-links').classList.toggle('show');
        }
    </script>

</body>
